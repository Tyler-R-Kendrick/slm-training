<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TwoTower · Annotate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/preview/preview.css" />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231f4d3a'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <main class="stage annotate-stage">
      <header class="brand">
        <p class="brand-mark">TwoTower</p>
        <p class="brand-sub">Grade OpenUI samples · ↑ good · ↓ bad · ← → navigate</p>
      </header>

      <section class="card-stack" id="card" aria-label="Annotation sample" tabindex="0">
        <div class="card-meta">
          <span class="index-pill" id="indexPill">1 / 1</span>
          <span class="badge" id="badge">loading</span>
        </div>

        <div class="request-block">
          <p class="field-label">Request</p>
          <p class="prompt-text" id="promptText">Loading prompt…</p>
        </div>

        <div class="view-toggle" role="tablist" aria-label="Output view">
          <button
            type="button"
            class="view-btn is-active"
            id="btnViewRender"
            role="tab"
            aria-selected="true"
            data-view="render"
            title="Rendered view (Tab to toggle)"
          >
            Rendered
          </button>
          <button
            type="button"
            class="view-btn"
            id="btnViewDsl"
            role="tab"
            aria-selected="false"
            data-view="dsl"
            title="DSL view (Tab to toggle)"
          >
            DSL
          </button>
        </div>

        <div class="view-panels">
          <div
            class="preview-panel view-panel is-active"
            id="panelRender"
            role="tabpanel"
            aria-label="Rendered OpenUI"
          >
            <div id="preview" class="preview-mount"></div>
          </div>
          <div
            class="source-panel view-panel"
            id="panelDsl"
            role="tabpanel"
            aria-label="OpenUI DSL"
            hidden
          >
            <pre class="output" id="output"><code>// generating…</code></pre>
          </div>
        </div>

        <p class="error" id="error" hidden></p>

        <label class="note-label" for="note">Note (optional)</label>
        <textarea
          id="note"
          name="note"
          rows="2"
          placeholder="Type to annotate… Enter stays in note; Esc to blur"
          spellcheck="true"
        ></textarea>

        <div class="grade-row" role="group" aria-label="Grade sample">
          <button type="button" class="grade down" id="btnDown" aria-label="Thumbs down">
            <span aria-hidden="true">↓</span> Down
          </button>
          <button type="button" class="nav" id="btnPrev" aria-label="Previous">←</button>
          <button type="button" class="nav" id="btnNext" aria-label="Next">→</button>
          <button type="button" class="grade up" id="btnUp" aria-label="Thumbs up">
            Up <span aria-hidden="true">↑</span>
          </button>
        </div>
        <p class="status" id="status" role="status"></p>
      </section>

      <details class="advanced">
        <summary>Advanced</summary>
        <label class="prompt-label" for="design_md">DESIGN.md (optional)</label>
        <textarea
          id="design_md"
          name="design_md"
          rows="3"
          placeholder="Paste DESIGN.md to condition generation"
          spellcheck="false"
        ></textarea>
        <label class="toggle">
          <input type="checkbox" id="grammar" checked />
          Grammar guard
        </label>
        <label class="toggle">
          <input type="checkbox" id="keepPlaceholders" />
          Keep :placeholders in preview
        </label>
      </details>
    </main>
    <script src="/static/preview/preview.js" type="module"></script>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
