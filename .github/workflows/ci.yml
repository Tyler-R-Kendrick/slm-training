name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history: the version-stamp bump check and changed-regression
          # selection diff against the PR base commit, and post-checkout
          # fetches are unreliable without persisted credentials.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/apps/openui_bridge/package-lock.json
            src/apps/design_md_bridge/package-lock.json
            src/apps/graphql_bridge/package-lock.json
      - run: python -m pip install -e ".[dev,mcp,web]"
      - name: Install Node dependencies
        run: |
          npm ci &
          root_pid=$!
          npm --prefix src/apps/openui_bridge ci &
          openui_pid=$!
          npm --prefix src/apps/design_md_bridge ci &
          design_pid=$!
          npm --prefix src/apps/graphql_bridge ci &
          graphql_pid=$!
          wait "$root_pid"
          wait "$openui_pid"
          wait "$design_pid"
          wait "$graphql_pid"
      - name: Validate repository organization
        run: python -m scripts.repo_policy
      - run: ruff check .
      - run: python -m compileall -q src scripts tests
      - name: Run changed regression tests
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python -m scripts.check_changed --changed-tests-only --base-ref "$BASE_SHA"
      - name: Validate dashboard OpenUI page programs are in sync
        run: python scripts/validate_page_dsl.py --check
      - name: Verify checkpoint references are resolvable and provenanced
        run: python -m scripts.verify_checkpoint_references --check
      - name: Verify version stamps and component bumps
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m scripts.verify_version_stamps --check --base "${{ github.event.pull_request.base.sha }}"
          else
            python -m scripts.verify_version_stamps --check
          fi

  data-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/apps/openui_bridge/package-lock.json
      - run: python -m pip install -e .
      - run: npm ci
        working-directory: src/apps/openui_bridge
      - name: Verify documented disjoint data build
        run: |
          python -m scripts.build_train_data --source all --version ci --synthesizer none
          python -m scripts.build_test_data --source both --version ci --train-manifest outputs/data/train/ci/manifest.json
          test -s outputs/data/train/ci/quality_report.json
          test -f outputs/data/train/ci/rejected.jsonl
      - name: Persist CI dataset metadata (manifest + stats + quality report)
        uses: actions/upload-artifact@v4
        with:
          name: ci-dataset-metadata
          path: |
            outputs/data/train/ci/manifest.json
            outputs/data/train/ci/stats.json
            outputs/data/train/ci/quality_report.json
            outputs/data/eval/ci/manifest.json
            outputs/data/eval/ci/stats.json
          if-no-files-found: error
