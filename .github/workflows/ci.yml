name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history: the version-stamp bump check and changed-regression
          # selection diff against the PR base commit, and post-checkout
          # fetches are unreliable without persisted credentials.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python and Node dependencies
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          node -e 'const major=Number(process.versions.node.split(".")[0]); if (major < 20 || major >= 23) process.exit(1)'
          npm --prefix src/apps/openui_bridge ci &
          openui_pid=$!
          need_node=false
          if ! git diff --quiet "$BASE_SHA"...HEAD -- \
            package.json package-lock.json src/apps \
            src/slm_training/web/static/openui scripts/validate_page_dsl.py; then
            need_node=true
            npm ci &
            root_pid=$!
            npm --prefix src/apps/design_md_bridge ci &
            design_pid=$!
            npm --prefix src/apps/graphql_bridge ci &
            graphql_pid=$!
          fi
          echo "NEED_NODE=$need_node" >> "$GITHUB_ENV"

          python -m pip install --only-binary=:all: \
            --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.2,<2.6"
          python -m pip install --no-deps -e .
          python -m pip install \
            "pytest>=8,<9" "pytest-asyncio>=0.23,<2" "ruff>=0.9,<1" \
            "numpy>=1.26,<3" "httpx>=0.27,<1" "fastapi>=0.110,<1" \
            "lark>=1.1,<2" "pydantic>=2.7,<3"

          extras=
          if ! git diff --quiet "$BASE_SHA"...HEAD -- \
            src/slm_training/mcp scripts/multi_farm_mcp.py tests/test_mcp; then
            extras=mcp
          fi
          if ! git diff --quiet "$BASE_SHA"...HEAD -- \
            src/slm_training/models/onnx_inference.py scripts/export_onnx.py \
            scripts/serve_playground.py tests/test_export_onnx.py \
            tests/test_web/test_onnx_inference.py; then
            extras="${extras:+$extras,}web"
          fi
          if [ -n "$extras" ]; then
            python -m pip install -e ".[$extras]"
          fi

          wait "$openui_pid"
          if [ "$need_node" = true ]; then
            wait "$root_pid"
            wait "$design_pid"
            wait "$graphql_pid"
          fi
      - name: Run changed regression tests
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python -m scripts.check_changed --changed-tests-only --base-ref "$BASE_SHA"

  python-static:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install static-check dependencies
        run: |
          python -m pip install --no-deps -e .
          python -m pip install "ruff>=0.9,<1" "pydantic>=2.7,<3" "lark>=1.1,<2"
      - name: Validate repository organization
        run: python -m scripts.repo_policy
      - run: ruff check .
      - run: python -m compileall -q src scripts tests
      - name: Verify checkpoint references are resolvable and provenanced
        run: python -m scripts.verify_checkpoint_references --check
      - name: Verify version stamps and component bumps
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m scripts.verify_version_stamps --check --base "${{ github.event.pull_request.base.sha }}"
          else
            python -m scripts.verify_version_stamps --check
          fi

  data-build:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/apps/openui_bridge/package-lock.json
      - run: python -m pip install -e .
      - run: npm ci
        working-directory: src/apps/openui_bridge
      - name: Verify documented disjoint data build
        run: |
          python -m scripts.build_train_data --source all --version ci --synthesizer none
          python -m scripts.build_test_data --source both --version ci --train-manifest outputs/data/train/ci/manifest.json
          test -s outputs/data/train/ci/quality_report.json
          test -f outputs/data/train/ci/rejected.jsonl
      - name: Validate dashboard OpenUI page programs are in sync
        run: python scripts/validate_page_dsl.py --check
      - name: Persist CI dataset metadata (manifest + stats + quality report)
        uses: actions/upload-artifact@v4
        with:
          name: ci-dataset-metadata
          path: |
            outputs/data/train/ci/manifest.json
            outputs/data/train/ci/stats.json
            outputs/data/train/ci/quality_report.json
            outputs/data/eval/ci/manifest.json
            outputs/data/eval/ci/stats.json
          if-no-files-found: error
