[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slm-training"
version = "0.1.0"
description = "Harnesses for placeholder OpenUI SLM experiments"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Tyler Kendrick" }]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]
# Required for TwoTower training / generation
torch = [
  "torch>=2.2",
]
mcp = [
  "fastmcp>=2.0",
  "httpx>=0.27",
  "python-dotenv>=1.0",
]

[project.scripts]
build-train-data = "scripts.build_train_data:main"
build-test-data = "scripts.build_test_data:main"
train-model = "scripts.train_model:main"
evaluate-model = "scripts.evaluate_model:main"
multi-farm-mcp = "scripts.multi_farm_mcp:main"

[tool.setuptools.packages.find]
where = ["src", "."]
include = ["slm_training*", "gpu_multi_farm*", "scripts*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
